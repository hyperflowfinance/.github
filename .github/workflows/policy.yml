name: PR Policy

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  policy:
    name: Policy
    runs-on: ubuntu-latest

    steps:
      - name: Run PR policy and publish stable status
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            if (!pr) {
              core.setFailed("This workflow must run on a pull_request event.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = pr.head.sha;

            const title = pr.title || "";
            const body = pr.body || "";
            const text = `${title}\n${body}`;

            const jiraRegex = /\b[A-Z][A-Z0-9]+-[0-9]+\b/;
            const trelloRegex = /https?:\/\/trello\.com\/c\/[a-zA-Z0-9]+/;
            const prAuthor = (pr.user?.login || "").toLowerCase();

            const errors = [];

            const isDependabotPR = prAuthor === "dependabot[bot]";

            if (!isDependabotPR && !jiraRegex.test(text) && !trelloRegex.test(text)) {
              errors.push("PR must contain a Jira/internal ticket like HF-123 or a Trello card link.");
            }

            if (!body.trim()) {
              errors.push("PR description cannot be empty.");
            }

            const passed = errors.length === 0;

            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha,
              state: passed ? "success" : "failure",
              context: "hyperflow/pr-policy",
              description: passed
                ? "PR policy passed"
                : errors[0].slice(0, 140)
            });

            if (!passed) {
              core.setFailed(errors.join("\n"));
            }
