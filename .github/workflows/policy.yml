name: PR Policy

on:
  workflow_call:

jobs:
  enforce-pr-policy:
    name: Enforce PR Policy
    runs-on: ubuntu-latest

    steps:
      - name: Check PR title contains ticket reference
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if echo "$PR_TITLE" | grep -qE '\b[A-Z][A-Z0-9]+-[0-9]+\b'; then
            echo "✅ PR title contains a ticket reference: $PR_TITLE"
          else
            echo "❌ PR title must contain a ticket reference like HF-123, API-45, or HYPERFLOW-88."
            echo "Current title: $PR_TITLE"
            exit 1
          fi

      - name: Check PR description is not empty
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$(echo "$PR_BODY" | tr -d '[:space:]')" ]; then
            echo "❌ PR description cannot be empty."
            exit 1
          fi
          echo "✅ PR description is present."
